<!DOCTYPE html>
<html>
<head>
  <title>Report Missing</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="logo-box">
    <img src="images/logo.png" class="logo">
    <h2>AI GARUDA</h2>
  </div>

  <a href="index.html">Home</a>

</div>

<h2>Report Missing Person</h2>

<form onsubmit="submitForm(event)">

<input id="name" placeholder="Name" required><br>
<input id="age" placeholder="Age"><br>

<input id="mobile1" placeholder="Family Mobile 1"><br>
<input id="mobile2" placeholder="Family Mobile 2"><br>

<h3>Missing Location</h3>
<input id="m_state" placeholder="State"><br>
<input id="m_district" placeholder="District"><br>
<input id="m_village" placeholder="Village"><br>

<h3>Address</h3>
<input id="a_state" placeholder="State"><br>
<input id="a_district" placeholder="District"><br>
<input id="a_village" placeholder="Village"><br>
<input id="colony" placeholder="Colony"><br>

<input id="date" type="date"><br>

<textarea id="description" placeholder="Description"></textarea><br>

<input type="file" id="image"><br><br>

<button type="submit">Submit</button>

</form>

<script src="app.js"></script>

</body>
</html>
